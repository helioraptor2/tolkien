<meta charset="UTF-8" />

<title>Map of Middle-earth — Vector / Canvas</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden;
    font-family: "Palatino Linotype", Palatino, Georgia, serif; }
  #map { display: block; width: 100vw; height: 100vh; cursor: grab; background: #efe6cf; }
  #map.dragging { cursor: grabbing; }

  .ui { position: absolute; z-index: 10; user-select: none; }

  #title {
    top: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(244,236,214,.92); border: 1px solid #b7a27a; border-radius: 8px;
    padding: 6px 18px; font-size: 20px; letter-spacing: 1px; color: #4a3b1e;
    box-shadow: 0 2px 8px rgba(0,0,0,.25); pointer-events: none; white-space: nowrap;
  }

  #controls { top: 12px; left: 12px; display: flex; flex-direction: column; gap: 6px; }
  #controls button {
    width: 38px; height: 38px; font-size: 20px; font-weight: bold; line-height: 1;
    background: rgba(244,236,214,.95); border: 1px solid #b7a27a; border-radius: 6px;
    color: #4a3b1e; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.2);
  }
  #controls button:hover { background: #fff7e2; }
  #controls button#reset, #controls button#lbl { font-size: 14px; }

  #legend {
    bottom: 12px; left: 12px; background: rgba(244,236,214,.92);
    border: 1px solid #b7a27a; border-radius: 8px; padding: 8px 12px;
    font-size: 13px; color: #4a3b1e; box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  #legend .row { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
  #legend .sw { width: 22px; height: 12px; border: 1px solid #6b5d3e; border-radius: 2px; }

  #readout {
    bottom: 12px; right: 12px; background: rgba(244,236,214,.92);
    border: 1px solid #b7a27a; border-radius: 6px; padding: 4px 10px;
    font-size: 12px; color: #4a3b1e; font-family: monospace;
  }
</style>
</head>
<body>
  <canvas id="map"></canvas>
  <div id="title" class="ui">⚔ Middle-earth ⚔</div>
  <div id="controls" class="ui">

    <button id="zout" title="Zoom out">−</button>
    <button id="reset" title="Reset view">⤢</button>
    <button id="lbl" title="Toggle captions">A</button>
    <button id="grid" title="Toggle coordinate grid">#</button>

/* =====================================================================
   CAMERA + CANVAS RENDERER
   ===================================================================== */

const canvas = document.getElementById("map");
const ctx = canvas.getContext("2d");
const readout = document.getElementById("readout");

const cam = { x: WORLD.w / 2, y: WORLD.h / 2, scale: 1 };
let dpr = 1, viewW = 0, viewH = 0;
let showCaptions = true, showGrid = true, showContours = true;
const MIN_SCALE = 0.2, MAX_SCALE = 12;

function resize() {
  dpr = window.devicePixelRatio || 1;
  viewW = window.innerWidth;  viewH = window.innerHeight;
  canvas.width = Math.round(viewW * dpr);
  canvas.height = Math.round(viewH * dpr);
  canvas.style.width = viewW + "px";  canvas.style.height = viewH + "px";
  requestDraw();
}

function sx(x){ return (x - cam.x) * cam.scale + viewW/2; }
function sy(y){ return (y - cam.y) * cam.scale + viewH/2; }
function wx(p){ return (p - viewW/2)/cam.scale + cam.x; }
function wy(p){ return (p - viewH/2)/cam.scale + cam.y; }

function fitView() {
  const pad = 40;
  cam.scale = Math.min((viewW - pad)/WORLD.w, (viewH - pad)/WORLD.h);
  cam.scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, cam.scale));
  cam.x = WORLD.w/2;  cam.y = WORLD.h/2;
  requestDraw();
}

function hash(i){ const s = Math.sin(i*127.1)*43758.5453; return s - Math.floor(s); }

function tracePoly(pts){
  ctx.beginPath();
  ctx.moveTo(sx(pts[0][0]), sy(pts[0][1]));
  for (let i=1;i<pts.length;i++) ctx.lineTo(sx(pts[i][0]), sy(pts[i][1]));
}

// Plain horizontal caption with halo, fixed screen size.
function caption(text, X, Y, color, font, align){
  ctx.font = font; ctx.textAlign = align || "center"; ctx.textBaseline = "middle";
  ctx.lineWidth = 3; ctx.strokeStyle = "rgba(244,236,214,.92)";
  ctx.strokeText(text, X, Y);
  ctx.fillStyle = color; ctx.fillText(text, X, Y);
}
// Caption rotated to follow a polyline's middle segment.
function captionAlong(path, text, color, font){
  const i = Math.max(0, Math.floor(path.length/2) - 1);
  const a = path[i], b = path[i+1] || path[i];
  const mx = (a[0]+b[0])/2, my = (a[1]+b[1])/2;
  let ang = Math.atan2(sy(b[1])-sy(a[1]), sx(b[0])-sx(a[0]));
  if (ang > Math.PI/2) ang -= Math.PI; if (ang < -Math.PI/2) ang += Math.PI;
  ctx.save();
  ctx.translate(sx(mx), sy(my)); ctx.rotate(ang);
  caption(text, 0, -7, color, font, "center");
  ctx.restore();
}

/* ---- feature drawing ---- */
function drawWater(){
  for (const w of waterBodies){
    tracePoly(w.poly); ctx.closePath();
    ctx.fillStyle = "#9ec5d8"; ctx.fill();
    ctx.lineWidth = Math.max(1, 1.2*cam.scale); ctx.strokeStyle = "#5f93ad"; ctx.stroke();
  }
}
function drawForests(){
  for (const f of forests){
    tracePoly(f.poly); ctx.closePath();
    ctx.fillStyle = "#8aa86b"; ctx.fill();
    ctx.lineWidth = Math.max(1, cam.scale); ctx.strokeStyle = "#5e7d46"; ctx.stroke();
  }
}
function drawHills(){
  for (const h of hills){
    tracePoly(h.poly); ctx.closePath();
    ctx.fillStyle = "#cdbf94"; ctx.fill();
    ctx.lineWidth = Math.max(1, cam.scale); ctx.strokeStyle = "#9c8a5e"; ctx.stroke();
  }
}
function drawRivers(){
  ctx.lineCap = "round"; ctx.lineJoin = "round";
  for (const r of rivers){
    tracePoly(r.path);
    ctx.lineWidth = Math.max(1.2, r.width*cam.scale); ctx.strokeStyle = "#5f93ad"; ctx.stroke();
  }
}
function drawRoads(){
  ctx.lineCap = "round"; ctx.lineJoin = "round";
  for (const rd of roads){
    tracePoly(rd.path);
    ctx.setLineDash([8,6]);
    ctx.lineWidth = Math.max(1.5, 2.4*Math.sqrt(cam.scale)); ctx.strokeStyle = "#a77b3e"; ctx.stroke();
    ctx.setLineDash([]);
  }
}
function drawPlaces(){
  for (const p of places){
    const X=sx(p.x), Y=sy(p.y);
    if (X<-60||X>viewW+60||Y<-40||Y>viewH+40) continue;
    drawMarker(X,Y,p.kind);
    if (showCaptions) caption(p.name, X+9, Y, "#2c2110", "13px Georgia, serif", "left");
  }
}
function drawMarker(X,Y,kind){
  ctx.lineWidth=1.4;
  if (kind==="volcano"){
    ctx.beginPath(); ctx.moveTo(X,Y-8); ctx.lineTo(X-7,Y+5); ctx.lineTo(X+7,Y+5); ctx.closePath();
    ctx.fillStyle="#a83a2a"; ctx.fill(); ctx.strokeStyle="#5e1b12"; ctx.stroke();
  } else if (kind==="tower"){
    ctx.fillStyle="#3a2c12"; ctx.fillRect(X-3,Y-6,6,12); ctx.strokeStyle="#1d1607"; ctx.strokeRect(X-3,Y-6,6,12);
  } else if (kind==="fort"||kind==="ruin"){
    ctx.fillStyle = kind==="ruin"?"#8a7a5c":"#5b4a2a"; ctx.fillRect(X-5,Y-4,10,8);
    ctx.strokeStyle="#2c2110"; ctx.strokeRect(X-5,Y-4,10,8);
  } else if (kind==="haven"){
    // anchor-blue diamond for ports / elven havens
    ctx.beginPath(); ctx.moveTo(X,Y-6); ctx.lineTo(X+6,Y); ctx.lineTo(X,Y+6); ctx.lineTo(X-6,Y); ctx.closePath();
    ctx.fillStyle="#3f7fa0"; ctx.fill(); ctx.strokeStyle="#274e63"; ctx.stroke();
  } else if (kind==="landmark"){
    // small hollow ring with a centre dot for natural landmarks / crossings
    ctx.beginPath(); ctx.arc(X,Y,4.5,0,Math.PI*2); ctx.fillStyle="rgba(244,236,214,.9)"; ctx.fill();
    ctx.strokeStyle="#5a3c1a"; ctx.stroke();
    ctx.beginPath(); ctx.arc(X,Y,1.4,0,Math.PI*2); ctx.fillStyle="#5a3c1a"; ctx.fill();
  } else {
    ctx.beginPath(); ctx.arc(X,Y,5,0,Math.PI*2); ctx.fillStyle="#7a2f1c"; ctx.fill();
    ctx.strokeStyle="#3a160c"; ctx.stroke();
  }
}

// Cosmetic small lakes/tarns (overlay; no elevation effect).
function drawLakes(){
  for (const l of lakes){
    tracePoly(l.poly); ctx.closePath();
    ctx.fillStyle = "#9ec5d8"; ctx.fill();
    ctx.lineWidth = Math.max(1, 1.1*cam.scale); ctx.strokeStyle = "#5f93ad"; ctx.stroke();
  }
}
// Marshes/fens: pale wash plus a scatter of reed ticks and a dashed rim.
function drawMarshes(){
  for (const mh of marshes){
    tracePoly(mh.poly); ctx.closePath();
    ctx.fillStyle = "rgba(150,178,150,.45)"; ctx.fill();
    ctx.setLineDash([3,3]); ctx.lineWidth = 1; ctx.strokeStyle = "rgba(74,96,74,.7)"; ctx.stroke();
    ctx.setLineDash([]);
    // reed ticks: short vertical strokes seeded from the polygon vertices
    const c = centroid(mh.poly);
    ctx.strokeStyle = "rgba(60,86,60,.65)"; ctx.lineWidth = 1;
    for (let i=0;i<mh.poly.length;i++){
      const px = (mh.poly[i][0]*2 + c[0])/3, py = (mh.poly[i][1]*2 + c[1])/3;
      const X=sx(px), Y=sy(py), h=Math.max(2,2.2*cam.scale);
      ctx.beginPath(); ctx.moveTo(X,Y); ctx.lineTo(X,Y-h); ctx.stroke();
    }
  }
}

// Named summits: a dark peak glyph with a white snow cap, plus a bold label.
function drawPeaks(){
  for (const p of peaks){
    const X=sx(p.x), Y=sy(p.y);
    if (X<-40||X>viewW+40||Y<-30||Y>viewH+30) continue;
    ctx.beginPath(); ctx.moveTo(X,Y-10); ctx.lineTo(X-8,Y+5); ctx.lineTo(X+8,Y+5); ctx.closePath();
    ctx.fillStyle="#6b5d3e"; ctx.fill(); ctx.lineWidth=1; ctx.strokeStyle="#33260f"; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(X,Y-10); ctx.lineTo(X-4,Y-1.5); ctx.lineTo(X+4,Y-1.5); ctx.closePath();
    ctx.fillStyle="#fff"; ctx.fill();
    if (showCaptions){
      const txt = (p.note ? p.name+" ("+p.note+")" : p.name) + "  ·  " + p._m + " m";
      caption(txt, X, Y-15, "#2c2110", "bold 12px Georgia, serif", "center");
    }
  }
}

function drawCaptions(){
  if (!showCaptions) return;
  // regions (always, large, spaced)
  for (const r of regionLabels)
    caption(r.name.split("").join(" "), sx(r.x), sy(r.y),
            "rgba(74,59,30,.5)", "italic 22px 'Palatino Linotype', serif", "center");
  // feature captions appear once you zoom in a little (reduces clutter)
  if (cam.scale < 0.55) return;
  for (const w of waterBodies)
    caption(w.name, sx(w.lx), sy(w.ly), "#2f6076", "italic 13px Georgia, serif", "center");
  for (const l of lakes)
    caption(l.name, sx(l.lx), sy(l.ly), "#2f6076", "italic 11px Georgia, serif", "center");
  for (const mh of marshes)
    caption(mh.name, sx(mh.lx), sy(mh.ly), "#3f5a3f", "italic 11px Georgia, serif", "center");
  for (const f of forests)
    caption(f.name, sx(f.lx), sy(f.ly), "#3c5a2a", "italic 12px Georgia, serif", "center");
  for (const m of mountainRanges)
    caption(m.name, sx(m.lx), sy(m.ly), "#5b4a2a", "italic 12px Georgia, serif", "center");
  for (const h of hills){
    const c = centroid(h.poly);
    caption(h.name, sx(c[0]), sy(c[1]), "#6e5a2e", "italic 11px Georgia, serif", "center");
  }
  for (const r of rivers)  captionAlong(r.path, r.name, "#2f6076", "italic 15px Georgia, serif");
  for (const rd of roads)  captionAlong(rd.path, rd.name, "#7a5520", "11px Georgia, serif");
  for (const p of passes)  caption("›‹ " + p.name, sx(p.x), sy(p.y), "#5a3c1a", "italic 11px Georgia, serif", "center");
}

function centroid(poly){
  let x=0,y=0; for (const p of poly){x+=p[0]; y+=p[1];}
  return [x/poly.length, y/poly.length];
}

function drawFrame(){
  ctx.lineWidth=2; ctx.strokeStyle="#8a7a52";
  ctx.strokeRect(sx(0), sy(0), WORLD.w*cam.scale, WORLD.h*cam.scale);
}

/* =====================================================================
   ELEVATION FIELD + CONTOUR LINES
   A synthetic height field is built from the terrain features: each
   mountain peak and hill contributes a radial bump; water bodies push
   the surface below sea level. Contours are then traced once in world
   space with marching squares and merely re-projected every frame.
   ===================================================================== */

// Mountain passes: low gaps carved into a ridge so a road can cross
// without going over the peaks. Each notches the crest down locally.
const passes = [
  { name: "High Pass",     x: 504, y: 302, depth: 0.80, r: 18 },  // Misty Mtns, Great East Road
  { name: "Gap of Rohan",  x: 470, y: 500, depth: 0.30, r: 22 },  // between Misty Mtns & Ered Nimrais
  { name: "Redhorn Pass",  x: 508, y: 258, depth: 0.55, r: 14 },  // Caradhras, above Moria
  { name: "Cirith Ungol",  x: 708, y: 552, depth: 0.45, r: 11 },  // pass over the Ephel Dúath
];
const MTN_WIDTH = 20;     // ridge half-width (sigma) in world units

// Named summits. Each raises a distinct, snow-capped peak above the
// surrounding ridge; the bigger the amp, the higher (and snowier) it is.
const peaks = [
  { name: "Caradhras",    x: 506, y: 232, amp: 1.05, r: 13 },
  { name: "Celebdil",     x: 516, y: 248, amp: 1.00, r: 12 },
  { name: "Fanuidhol",    x: 527, y: 256, amp: 0.95, r: 12 },
  { name: "Thangorodrim", x: 440, y: 32,  amp: 1.20, r: 16, note: "First Age" },
  { name: "Erebor",       x: 730, y: 176, amp: 0.78, r: 9,  note: "Lonely Mtn" },
  { name: "Gundabad",     x: 545, y: 72,  amp: 0.95, r: 14 },
  { name: "Mindolluin",   x: 628, y: 600, amp: 0.92, r: 13 },
  { name: "Methedras",    x: 502, y: 420, amp: 0.90, r: 12 },
  { name: "Dwimorberg",   x: 492, y: 566, amp: 0.82, r: 11, note: "Haunted Mtn" },
  { name: "Halifirien",   x: 558, y: 524, amp: 0.70, r: 10 },
];

// distance from a point to a polyline (min over its segments)
function distSeg(px,py,x1,y1,x2,y2){
  const dx=x2-x1, dy=y2-y1, l2=dx*dx+dy*dy;
  let t = l2 ? ((px-x1)*dx+(py-y1)*dy)/l2 : 0;
  t = t<0?0:t>1?1:t;
  return Math.hypot(px-(x1+t*dx), py-(y1+t*dy));
}
function distToRidge(px,py,pts){
  let best=Infinity;
  for (let i=0;i<pts.length-1;i++){
    const d=distSeg(px,py,pts[i][0],pts[i][1],pts[i+1][0],pts[i+1][1]);
    if(d<best)best=d;
  }
  return best;
}

// point-in-polygon (ray casting) — used for the sea mask
function pointInPoly(px,py,poly){
  let inside=false;
  for (let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i][0],yi=poly[i][1],xj=poly[j][0],yj=poly[j][1];
    if (((yi>py)!==(yj>py)) && (px < (xj-xi)*(py-yi)/((yj-yi)||1e-9)+xi)) inside=!inside;
  }
  return inside;
}

// One-time setup: hill centroids and per-peak summit heights.
function buildElevation(){
  for (const h of hills) h._c = centroid(h.poly);
  for (const p of peaks) p._m = fieldToM(baseElevation(p.x,p.y));
}

// Continuous BASE elevation field (calibrated field units), before rivers.
//   - inside any water body -> sea floor (a true local minimum)
//   - on land -> a gently ROLLING regional surface (no dead-flat sea-level
//     plains), with mountain ridges, named peaks and carved passes on top.
function baseElevation(x,y){
  for (const w of waterBodies) if (pointInPoly(x,y,w.poly)) return -0.06;

  // regional rolling relief: long-wavelength swells so the lowlands rise and
  // fall gently (~0–800 m) and contour lines are spread across the whole land.
  let e = 0.20
        + 0.045*Math.sin(x*0.010 + 0.7)
        + 0.032*Math.cos(y*0.012 + 1.9)
        + 0.024*Math.sin((x+y)*0.0065 + 2.4);
  // fine detail
  e += 0.006*Math.sin(x*0.13 + y*0.07)
     + 0.004*Math.cos(x*0.05 - y*0.11)
     + 0.003*Math.sin(x*0.31 + y*0.23);
  // mountains: highest ridge wins; named summits rise above
  let mtn = 0;
  for (const m of mountainRanges){
    const d = distToRidge(x,y,m.ridge);
    const h = m.scale * Math.exp(-(d*d)/(2*MTN_WIDTH*MTN_WIDTH));
    if (h>mtn) mtn=h;
  }
  for (const p of peaks){
    const dx=x-p.x, dy=y-p.y;
    const h = p.amp*Math.exp(-(dx*dx+dy*dy)/(2*p.r*p.r));
    if (h>mtn) mtn=h;
  }
  for (const p of passes){
    const dx=x-p.x, dy=y-p.y;
    mtn -= p.depth*Math.exp(-(dx*dx+dy*dy)/(2*p.r*p.r));
  }
  if (mtn>0) e += mtn;
  // hills
  for (const hh of hills){
    const dx=x-hh._c[0], dy=y-hh._c[1];
    e += 0.18*Math.exp(-(dx*dx+dy*dy)/(2*38*38));
  }
  return e;
}

/* =====================================================================
   RIVER VALLEYS — making rivers honour the contours
   For each river we carve a symmetric V-valley into the field along its
   smoothed course. Two properties follow purely from the geometry:
     • Symmetry about the course  =>  on the course the cross-stream slope
       cancels, so the gradient points straight downstream. A river that
       runs down the gradient crosses every contour (a level set, ⟂ to the
       gradient) at 90°.
     • A monotone valley-floor profile  =>  the river never flows uphill.
   The floor profile is built as a running minimum of the local terrain
   (so it always sits below ground and is non-increasing toward the mouth),
   clamped to sea level, with tributaries kept just above their trunk so
   they descend INTO it instead of trenching through it.
   ===================================================================== */
const RV_MARGIN = 0.04;     // channel depth below local ground (~156 m)
const RV_C      = 0.008;    // valley wall slope (field units per world unit)
const RV_SEAFLR = -0.06;    // channels bottom out at lake/sea level
const RV_DELTA  = 0.012;    // a tributary stays this far above its trunk

function rvResample(pts, ds){
  const out=[pts[0].slice()];
  for (let i=0;i<pts.length-1;i++){
    const x1=pts[i][0],y1=pts[i][1],x2=pts[i+1][0],y2=pts[i+1][1];
    const seg=Math.hypot(x2-x1,y2-y1), n=Math.max(1,Math.floor(seg/ds));
    for (let k=1;k<=n;k++){ const t=k/n; out.push([x1+(x2-x1)*t, y1+(y2-y1)*t]); }
  }
  return out;
}
function rvSmooth(pts, iters){
  let p=pts.map(q=>q.slice());
  for (let it=0; it<iters; it++){
    const q=[p[0]];
    for (let i=1;i<p.length-1;i++)
      q.push([(p[i-1][0]+2*p[i][0]+p[i+1][0])/4, (p[i-1][1]+2*p[i][1]+p[i+1][1])/4]);
    q.push(p[p.length-1]); p=q;
  }
  return p;
}
function rvArclen(pts){
  const s=[0];
  for (let i=1;i<pts.length;i++) s.push(s[i-1]+Math.hypot(pts[i][0]-pts[i-1][0],pts[i][1]-pts[i-1][1]));
  return s;
}
// nearest point on a river's polyline -> {d: distance, s: arclength there}
function rvNearest(r,px,py){
  const pts=r.path, S=r._s; let best=Infinity, bs=0;
  for (let i=0;i<pts.length-1;i++){
    const x1=pts[i][0],y1=pts[i][1],x2=pts[i+1][0],y2=pts[i+1][1];
    const dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy;
    let t = l2 ? ((px-x1)*dx+(py-y1)*dy)/l2 : 0; t = t<0?0:t>1?1:t;
    const cx=x1+t*dx, cy=y1+t*dy, d=Math.hypot(px-cx,py-cy);
    if (d<best){ best=d; bs=S[i]+t*Math.hypot(dx,dy); }
  }
  return {d:best, s:bs};
}
function rvFloorAt(r,s){
  const S=r._s, fl=r._floor;
  if (s<=S[0]) return fl[0];
  if (s>=S[S.length-1]) return fl[fl.length-1];
  let lo=0, hi=S.length-1;
  while (hi-lo>1){ const m=(lo+hi)>>1; if (S[m]<s) lo=m; else hi=m; }
  const t=(S[hi]>S[lo])?(s-S[lo])/(S[hi]-S[lo]):0;
  return fl[lo]+(fl[hi]-fl[lo])*t;
}

let riversReady = false;
// One-time: smooth every river, then build a monotone sub-terrain floor.
// Trunks must be built before the tributaries that reference them.
function buildRivers(){
  const byName={};
  for (const r of rivers){
    r.path = rvSmooth(rvResample(r.route, 5), 2);
    r._s   = rvArclen(r.path);
    byName[r.name]=r;
  }
  const ordered = rivers.slice().sort((a,b)=> (a.trunk?1:0)-(b.trunk?1:0)); // trunks first
  for (const r of ordered){
    const pts=r.path, n=pts.length;
    const b=pts.map(p=>baseElevation(p[0],p[1]));
    // running minimum of (ground - margin): below ground and non-increasing
    const env=new Array(n); let run=Infinity;
    for (let i=0;i<n;i++){ run=Math.min(run, b[i]-RV_MARGIN); env[i]=run; }
    let capv=RV_SEAFLR;
    if (r.trunk && byName[r.trunk]){
      const tr=byName[r.trunk], nr=rvNearest(tr, pts[n-1][0], pts[n-1][1]);
      capv = rvFloorAt(tr, nr.s) + RV_DELTA;       // sit just above the trunk
    }
    const floor=new Array(n);
    for (let i=0;i<n;i++) floor[i]=Math.max(env[i], capv);
    // keep the channel below ground but never below sea level
    for (let i=0;i<n;i++) floor[i]=Math.min(floor[i], Math.max(b[i]-RV_MARGIN, RV_SEAFLR));
    // enforce non-increasing toward the mouth by lowering only (never uphill)
    for (let i=1;i<n;i++) floor[i]=Math.min(floor[i], floor[i-1]);
    r._floor=floor;
  }
  riversReady=true;
}

// Final elevation field: the base terrain with river valleys carved in.
// This is what the contour tracer and relief shading sample.
//
// Each land point is assigned to its SINGLE nearest river and lies in that
// river's V-valley alone. Letting only one valley act per point (rather than
// blending several) keeps every cross-section symmetric, so the gradient on a
// channel points straight downstream — which is exactly what makes each river
// monotonic (never uphill) and square to the contours. Where two valleys meet,
// a drainage divide (ridge) falls naturally on the line equidistant between them.
function elevation(x,y){
  const e = baseElevation(x,y);
  if (!riversReady || e <= -0.05) return e;        // inside a water body: leave it
  let bestd=Infinity, br=null, bs=0;
  for (const r of rivers){
    const nr=rvNearest(r,x,y);
    if (nr.d<bestd){ bestd=nr.d; br=r; bs=nr.s; }
  }
  const T = rvFloorAt(br,bs) + RV_C*bestd;          // V-valley wall rising with distance
  return T<e ? T : e;
}

// Shared elevation grid, sampled once, used by BOTH the relief fill and
// the contour tracer.
let TER = null;
function buildTerrain(){
  const step = 4;   // fine enough to resolve the carved river valleys
  const nx = Math.floor(WORLD.w/step), ny = Math.floor(WORLD.h/step);
  const V = [];
  for (let i=0;i<=nx;i++){ V[i]=[]; for (let j=0;j<=ny;j++) V[i][j]=elevation(i*step, j*step); }
  TER = { step, nx, ny, V };
}

// ---- Elevation calibration: field value -> real metres ---------------
// Field ~0.10 is sea level; Caradhras (~1.26) ≈ 4500 m  ->  ~3900 m / unit.
const SEA_E = 0.10;                 // field value at sea level (0 m)
const M_PER_UNIT = 3900;            // metres per field unit
const CONTOUR_INTERVAL_M = 100;     // a contour line every 100 m
const INDEX_EVERY_M = 500;          // bold, labelled line every 500 m
const SNOW_M = 3500;                // permanent snow above ~3500 m
const mToField = m => SEA_E + m/M_PER_UNIT;
const fieldToM = e => Math.round((e-SEA_E)*M_PER_UNIT);
const SNOW_LEVEL = mToField(SNOW_M);

// Marching-squares iso-line tracing at every 100 m from sea level up.
const contours = [];   // [{ meters, level, index, segs:[[x1,y1,x2,y2],...] }]
function buildContours(){
  const {step,nx,ny,V} = TER;
  let maxE=-Infinity;
  for (let i=0;i<=nx;i++) for (let j=0;j<=ny;j++) if(V[i][j]>maxE) maxE=V[i][j];
  const maxM = (maxE-SEA_E)*M_PER_UNIT;
  const lerp=(a,b,L)=> (L-a)/(b-a);
  for (let m=CONTOUR_INTERVAL_M; m<=maxM; m+=CONTOUR_INTERVAL_M){
    const level = mToField(m);
    const segs=[];
    for (let i=0;i<nx;i++) for (let j=0;j<ny;j++){
      const x0=i*step, y0=j*step, x1=x0+step, y1=y0+step;
      const tl=V[i][j], tr=V[i+1][j], br=V[i+1][j+1], bl=V[i][j+1];
      let c=0; if(tl>level)c|=8; if(tr>level)c|=4; if(br>level)c|=2; if(bl>level)c|=1;
      if(c===0||c===15) continue;
      const T=[x0+step*lerp(tl,tr,level), y0];
      const R=[x1, y0+step*lerp(tr,br,level)];
      const B=[x0+step*lerp(bl,br,level), y1];
      const Lf=[x0, y0+step*lerp(tl,bl,level)];
      const push=(a,b)=>segs.push([a[0],a[1],b[0],b[1]]);
      switch(c){
        case 1: case 14: push(Lf,B); break;
        case 2: case 13: push(B,R);  break;
        case 3: case 12: push(Lf,R); break;
        case 4: case 11: push(T,R);  break;
        case 5:          push(Lf,T); push(B,R); break;
        case 6: case 9:  push(T,B);  break;
        case 7: case 8:  push(Lf,T); break;
        case 10:         push(T,R);  push(Lf,B); break;
      }
    }
    contours.push({ meters:m, level, index:(m % INDEX_EVERY_M === 0), segs });
  }
}

// Hypsometric colour ramp (low -> high). Returns null below the lowest
// stop so the lowlands keep the parchment background.
const RELIEF_MIN = 0.36;
const RAMP = [
  [0.36,[206,191,150]], [0.50,[184,162,114]], [0.64,[158,135,90]],
  [0.80,[140,122,98]],  [0.95,[160,150,134]], [1.02,[205,201,194]],
  [1.10,[240,239,236]], [1.20,[255,255,255]]   // white only at the very top
];
function reliefColor(e){
  if (e < RELIEF_MIN) return null;
  let a=RAMP[0], b=RAMP[RAMP.length-1];
  for (let i=0;i<RAMP.length-1;i++){ if (e>=RAMP[i][0] && e<=RAMP[i+1][0]){ a=RAMP[i]; b=RAMP[i+1]; break; } }
  const t=(e-a[0])/((b[0]-a[0])||1);
  const r=Math.round(a[1][0]+(b[1][0]-a[1][0])*t);
  const g=Math.round(a[1][1]+(b[1][1]-a[1][1])*t);
  const bl=Math.round(a[1][2]+(b[1][2]-a[1][2])*t);
  return "rgb("+r+","+g+","+bl+")";
}

// Filled hypsometric relief with snow caps — replaces the symbolic peaks.
function drawRelief(){
  const {step,nx,ny,V}=TER;
  const w = step*cam.scale + 1.2;            // +overlap to avoid seams
  for (let i=0;i<nx;i++) for (let j=0;j<ny;j++){
    const e=(V[i][j]+V[i+1][j]+V[i][j+1]+V[i+1][j+1])*0.25;
    const col=reliefColor(e); if(!col) continue;
    const X=sx(i*step), Y=sy(j*step);
    if (X<-w||X>viewW||Y<-w||Y>viewH) continue;   // viewport cull
    ctx.fillStyle=col; ctx.fillRect(X,Y,w,w);
  }
}

function drawContours(){
  if(!showContours) return;
  ctx.lineCap="round";
  for (const c of contours){
    ctx.beginPath();
    for (const s of c.segs){ ctx.moveTo(sx(s[0]),sy(s[1])); ctx.lineTo(sx(s[2]),sy(s[3])); }
    if (c.level >= SNOW_LEVEL){            // contours on the snow read white
      ctx.lineWidth = c.index ? 1.0 : 0.6; ctx.strokeStyle = "rgba(255,255,255,.85)";
    } else if (c.index){                   // bold "index" contour every 500 m
      ctx.lineWidth = 1.2; ctx.strokeStyle = "rgba(96,72,38,.60)";
    } else {                               // ordinary 100 m contour
      ctx.lineWidth = 0.55; ctx.strokeStyle = "rgba(96,72,38,.30)";
    }
    ctx.stroke();
  }
  if (cam.scale >= 0.45) drawContourLabels();   // labels only when readable
}

// Elevation labels along the index (every-500 m) contours.
function drawContourLabels(){
  for (const c of contours){
    if (!c.index || c.segs.length===0) continue;
    const white = c.level >= SNOW_LEVEL;
    const col = white ? "#41525a" : "#5b4326";
    const gap = Math.max(16, Math.floor(c.segs.length/4));   // ~4 labels per level
    for (let k=Math.floor(gap/2); k<c.segs.length; k+=gap){
      const s=c.segs[k];
      const X0=sx(s[0]),Y0=sy(s[1]),X1=sx(s[2]),Y1=sy(s[3]);
      if (X0<10||X0>viewW-10||Y0<10||Y0>viewH-10) continue;
      let ang=Math.atan2(Y1-Y0,X1-X0);
      if(ang>Math.PI/2)ang-=Math.PI; if(ang<-Math.PI/2)ang+=Math.PI;
      ctx.save();
      ctx.translate((X0+X1)/2,(Y0+Y1)/2); ctx.rotate(ang);
      caption(c.meters+" m", 0, 0, col, "10px monospace", "center");
      ctx.restore();
    }
  }
}

/* ---- coordinate graticule -------------------------------------------
   Adaptive spacing: pick a step whose on-screen size is comfortable. */
function gridStep(){
  const target = 90;                          // desired px between lines
  const candidates = [10,25,50,100,200,500];
  for (const c of candidates) if (c*cam.scale >= target) return c;
  return 500;
}
function drawGrid(){
  if(!showGrid) return;
  const g = gridStep();
  ctx.lineWidth = 1; ctx.strokeStyle = "rgba(90,74,42,.22)";
  ctx.font = "11px monospace"; ctx.fillStyle = "rgba(74,59,30,.85)";
  ctx.textBaseline = "top"; ctx.textAlign = "left";
  const x0=sx(0), y0=sy(0), x1=sx(WORLD.w), y1=sy(WORLD.h);
  // vertical lines (constant x)
  for (let x=0; x<=WORLD.w+0.1; x+=g){
    const X=sx(x);
    ctx.beginPath(); ctx.moveTo(X, Math.max(y0,0)); ctx.lineTo(X, Math.min(y1,viewH)); ctx.stroke();
    const ly = Math.min(Math.max(y0,2), viewH-14);
    ctx.fillText("x"+x, X+3, ly);
  }
  // horizontal lines (constant y)
  ctx.textBaseline = "bottom";
  for (let y=0; y<=WORLD.h+0.1; y+=g){
    const Y=sy(y);
    ctx.beginPath(); ctx.moveTo(Math.max(x0,0), Y); ctx.lineTo(Math.min(x1,viewW), Y); ctx.stroke();
    const lx = Math.min(Math.max(x0,2), viewW-40);
    ctx.fillText("y"+y, lx+3, Y-2);
  }
}

/* ---- main draw ---- */
let drawQueued=false;
function requestDraw(){ if(drawQueued) return; drawQueued=true; requestAnimationFrame(draw); }
function draw(){
  drawQueued=false;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,viewW,viewH);
  ctx.fillStyle="#efe6cf";
  ctx.fillRect(sx(0), sy(0), WORLD.w*cam.scale, WORLD.h*cam.scale);

  drawWater(); drawForests(); drawHills();
  drawRelief(); drawContours();
  drawRivers(); drawMarshes(); drawLakes();
  drawRoads(); drawGrid(); drawPlaces(); drawPeaks(); drawCaptions(); drawFrame();

  readout.textContent = "zoom ×" + cam.scale.toFixed(2);
}

/* =====================================================================
   INTERACTION
   ===================================================================== */
let dragging=false, lastX=0, lastY=0;
canvas.addEventListener("pointerdown", e=>{
  dragging=true; lastX=e.clientX; lastY=e.clientY;
  canvas.classList.add("dragging"); canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener("pointermove", e=>{
  readout.textContent = "x "+wx(e.clientX).toFixed(0)+"  y "+wy(e.clientY).toFixed(0)+"   zoom ×"+cam.scale.toFixed(2);
  if(!dragging) return;
  cam.x -= (e.clientX-lastX)/cam.scale; cam.y -= (e.clientY-lastY)/cam.scale;
  lastX=e.clientX; lastY=e.clientY; requestDraw();
});
function endDrag(){ dragging=false; canvas.classList.remove("dragging"); }
canvas.addEventListener("pointerup", endDrag);
canvas.addEventListener("pointercancel", endDrag);

canvas.addEventListener("wheel", e=>{
  e.preventDefault(); zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY*0.0015));
}, { passive:false });

function zoomAt(px,py,factor){
  const bx=wx(px), by=wy(py);
  cam.scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, cam.scale*factor));
  cam.x += bx - wx(px); cam.y += by - wy(py);
  requestDraw();
}

document.getElementById("zin").onclick  = ()=>zoomAt(viewW/2,viewH/2,1.4);
document.getElementById("zout").onclick = ()=>zoomAt(viewW/2,viewH/2,1/1.4);
document.getElementById("reset").onclick = fitView;
document.getElementById("lbl").onclick = ()=>{ showCaptions=!showCaptions; requestDraw(); };
document.getElementById("grid").onclick = ()=>{ showGrid=!showGrid; requestDraw(); };
document.getElementById("cont").onclick = ()=>{ showContours=!showContours; requestDraw(); };

window.addEventListener("resize", resize);
buildElevation(); buildRivers(); buildTerrain(); buildContours();   // one-time terrain pre-compute
resize(); fitView();
</script>
</body>
</html>
